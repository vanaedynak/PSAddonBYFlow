# Настройки аддона для ProtectionStones.
# Блок "default" описывает значения по умолчанию для всех приват-блоков.
default:
  # Количество жизней привата.
  lives: 3
  # Сколько урона наносит один взрыв.
  damage-per-explosion: 1
  # true — реагировать только на динамит; false — учитывать любые взрывы.
  tnt-only: true
  hologram:
    # Показывать ли голограмму с жизнями.
    enabled: true
    # Смещение голограммы по вертикали от центра блока.
    offset-y: 1.8
    # Можно указать строку или список. Доступные плейсхолдеры:
    # {lives}, {max}, {owner}, {owner_uuid}, {region}, {world}, {x}, {y}, {z}, {material}
    lines:
      - "&cЖизни привата: &#ff5555{lives}&7/&f{max}"
      - "&7Владелец: &f{owner}"

# Раздел blocks позволяет переопределять значения для конкретных блоков (материал указывается как в Bukkit API).
blocks:
  DIAMOND_BLOCK:
    lives: 5
    hologram:
      lines:
        - "&bАлмазный приват"
        - "&f{lives}&7/&f{max} &8жизней"

# Защита от бага со stack'ом приватных блоков.
prevent-stacking: true

messages:
  stack-block-denied: "&cНельзя ставить приват вплотную к другому приватному блоку!"

# Настройки интеграции с кастомными TNT, определяемыми через NBT/PersistentDataContainer.
custom-tnt:
  # Можно отключить интеграцию, если требуется поддержка только ванильного TNT.
  enabled: true
  # Ключ с типом TNT (по умолчанию CustomTNTFlow кладёт customtntflow:tnt_type).
  type-key: "customtntflow:tnt_type"
  # Ключ с JSON описанием свойств (customtntflow:traits). Можно отключить, оставив пустым.
  traits-key: "customtntflow:traits"
  types:
    # Произвольный идентификатор секции.
    region_breaker:
      # Значение в type-key, которое нужно сопоставить. Если не указано — используется имя секции.
      type: "region_breaker"
      # Проверяем отдельные поля из traits (JSON). Значения сравниваются без учёта регистра.
      traits:
        radius: 6
        drops: false
      # Сколько урона наносит кастомный заряд. Если убрать или поставить 0 — возьмётся значение блока.
      damage-override: 1
      # true — оставляем только приватные блоки в списке затронутых.
      only-region-blocks: true
      # true — если подходящих блоков нет, взрыв отменяется.
      cancel-when-empty: true
