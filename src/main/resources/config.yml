# Настройки аддона для ProtectionStones.
# Блок "default" описывает значения по умолчанию для всех приват-блоков.
default:
  # Количество жизней привата.
  lives: 3
  # Сколько урона наносит один взрыв.
  damage-per-explosion: 1
  # true — реагировать только на динамит; false — учитывать любые взрывы.
  tnt-only: true
  hologram:
    # Показывать ли голограмму с жизнями.
    enabled: true
    # Смещение голограммы по вертикали от центра блока.
    offset-y: 1.8
    # Можно указать строку или список. Доступные плейсхолдеры:
    # {lives}, {max}, {owner}, {owner_uuid}, {region}, {world}, {x}, {y}, {z}, {material}
    lines:
      - "&cЖизни привата: &#ff5555{lives}&7/&f{max}"
      - "&7Владелец: &f{owner}"

# Раздел blocks позволяет переопределять значения для конкретных блоков (материал указывается как в Bukkit API).
blocks:
  DIAMOND_BLOCK:
    lives: 5
    hologram:
      lines:
        - "&bАлмазный приват"
        - "&f{lives}&7/&f{max} &8жизней"

# Защита от бага со stack'ом приватных блоков.
prevent-stacking: true

messages:
  stack-block-denied: "&cНельзя ставить приват вплотную к другому приватному блоку!"

# Специальный динамит аддона выдаётся командой /regiontnt (по умолчанию доступно только операторам).
