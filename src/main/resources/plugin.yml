name: ${name}
main: dev.byflow.psaddon.PSAddonPlugin
version: ${version}
author: BYFlow
api-version: '1.20'
depend:
  - ProtectionStones
commands:
  psaddonbomb:
    description: Выдать региональный динамит, наносящий урон только привату.
    usage: /<command> <игрок> [количество]
    permission: psaddon.regionbomb
permissions:
  psaddon.regionbomb:
    description: Разрешает выдавать и получать региональный динамит.
    default: op
